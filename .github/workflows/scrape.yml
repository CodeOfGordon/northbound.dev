# Scheduled scrape: nightly POST to /api/refresh on the deployed site.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SITE_URL    — deployed base URL, e.g. https://northbound-dev.vercel.app (no trailing slash)
#   CRON_SECRET — same value as the CRON_SECRET env var on the deployment
#
# 100% free + deploy-and-forget: only the free public sources run
# (luma, mlh, hackathon, company — direct JSON/HTML fetches, no Apify). Each is
# fast (~2-5 s) so they stay well inside Vercel Hobby's ~60 s function cap.
#
# Eventbrite + Meetup are intentionally NOT scheduled: both killed their free public
# APIs, so they need the paid Apify actors. Run those on demand from your own machine
# (no 60 s cap, your Apify credit) when you want to top up the Local lane:
#   curl -X POST http://localhost:3000/api/refresh -H "Authorization: Bearer $CRON_SECRET" \
#     -H "Content-Type: application/json" -d '{"sources":["eventbrite","meetup"]}'
name: Scrape events

on:
  schedule:
    - cron: '15 7 * * *' # nightly ~03:15 ET — free sources
  workflow_dispatch:
    inputs:
      sources:
        description: 'Space-separated sources (free only on the hosted site)'
        required: false
        default: 'luma mlh hackathon company'

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check configuration
        id: cfg
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ⚠️ Scheduled scrape is not configured"
              echo ""
              echo "Set these **repository secrets** so the workflow can reach the deployment:"
              echo "- \`SITE_URL\` — deployed base URL (e.g. \`https://northbound-dev.vercel.app\`, no trailing slash)"
              echo "- \`CRON_SECRET\` — must match the \`CRON_SECRET\` env var on the deployment"
              echo ""
              echo "Settings → Secrets and variables → Actions → New repository secret."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::SITE_URL and/or CRON_SECRET are not set — skipping scrape."
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Configure SITE_URL and CRON_SECRET repo secrets before running this workflow."
              exit 1
            fi
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick sources for this trigger
        if: steps.cfg.outputs.configured == 'true'
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sources=${{ github.event.inputs.sources }}" >> "$GITHUB_OUTPUT"
          else
            echo "sources=luma mlh hackathon company" >> "$GITHUB_OUTPUT"
          fi

      # One POST per source so a single slow source can't starve the rest; each free
      # source finishes in a few seconds, comfortably under Vercel Hobby's ~60 s cap.
      - name: Trigger refresh per source
        if: steps.cfg.outputs.configured == 'true'
        run: |
          failed=0
          for source in ${{ steps.pick.outputs.sources }}; do
            echo "::group::$source"
            if ! curl --fail-with-body -sS -X POST "$SITE_URL/api/refresh" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"sources\":[\"$source\"]}" \
              --max-time 90; then
              echo "::warning::refresh failed for source: $source"
              failed=1
            fi
            echo
            echo "::endgroup::"
          done
          exit $failed
